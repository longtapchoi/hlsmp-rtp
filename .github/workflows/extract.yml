name: Giải nén và Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Giải nén file ZIP (nếu có)
        run: |
          shopt -s nullglob
          for f in *.zip; do
            echo "Giải nén $f"
            unzip -o "$f" -d .
            rm -f "$f"
          done

      - name: Xoá build.yml cũ
        run: rm -f .github/workflows/build.yml

      - name: Commit và push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: giải nén source HLSMP-Rtp"
          git push

  build:
    needs: extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HLSMP-Rtp
          path: target/HLSMP-Rtp.jar
